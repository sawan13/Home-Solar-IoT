<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolarOS Pro — Connected Devices</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafbfc;
  --bg2: #f0f2f5;
  --panel: #ffffff;
  --panel2: #f8f9fa;
  --border: rgba(0,0,0,0.06);
  --border2: rgba(0,0,0,0.10);
  --sun: #E87706;
  --sun2: #C96600;
  --green: #0a8754;
  --red: #c41d3a;
  --blue: #2563eb;
  --purple: #6d28d9;
  --text: #1a1f36;
  --muted: #6b7280;
  --muted2: #4b5563;
  --warn: #d97706;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Roboto', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  overflow-x:hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(217,119,6,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 10% 80%, rgba(37,99,235,0.06) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

header {
  position:sticky; top:0; z-index:100;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display:flex; align-items:center; justify-content:space-between;
  height: 60px;
}
.logo { display:flex; align-items:center; gap:10px; cursor:pointer; }
.logo-mark {
  width:34px; height:34px;
  background: linear-gradient(135deg, var(--sun), var(--warn));
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:17px;
}
.logo-name { font-weight:900; font-size:17px; letter-spacing:-0.5px; }
.logo-name span { color:var(--sun); }
.header-center { display:flex; align-items:center; gap:6px; }
.nav-tab {
  padding:6px 16px;
  border-radius:8px;
  font-size:13px;
  font-weight:600;
  color:var(--muted2);
  cursor:pointer;
  border:none; background:none;
  transition:all 0.2s;
}
.nav-tab:hover, .nav-tab.active { background:var(--panel2); color:var(--text); }
.header-right { display:flex; align-items:center; gap:12px; }
.live-chip { 
  display:flex; align-items:center; gap:7px; 
  background: rgba(5,150,105,0.1); 
  border:1px solid rgba(5,150,105,0.25); 
  border-radius:20px; 
  padding:5px 13px; 
  font-family:'Roboto', sans-serif; 
  font-size:11px; 
  color:var(--green); 
}
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(5,150,105,0.5)} 50%{opacity:0.6;box-shadow:0 0 0 4px rgba(5,150,105,0)} }
#clock { 
  font-family:'Roboto', sans-serif; 
  font-size:13px; 
  color:var(--muted2); 
  background:var(--panel); 
  padding:6px 12px; 
  border-radius:8px; 
  border:1px solid var(--border); 
}
.user-info-header {
  display:flex; align-items:center; gap:6px;
  padding:4px 10px;
  background:var(--panel2);
  border:1px solid var(--border2);
  border-radius:20px;
  cursor:pointer;
}
.user-avatar-small {
  width:24px; height:24px;
  border-radius:50%;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  display:flex; align-items:center; justify-content:center;
  font-size:12px;
}
.user-name-display {
  font-size:11px;
  font-weight:600;
  color:var(--text);
  max-width:80px;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.user-role-display { font-size:9px; color:var(--muted); }
.logout-btn {
  width:32px; height:32px;
  border-radius:8px;
  background:rgba(196,29,58,0.1);
  border:1px solid rgba(196,29,58,0.3);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:14px;
  transition:all .2s;
}
.logout-btn:hover { background:rgba(196,29,58,0.2); }
.sidebar-toggle {
  display:none;
  width:40px; height:40px;
  background:var(--panel2);
  border:1px solid var(--border2);
  border-radius:10px;
  cursor:pointer;
  align-items:center; justify-content:center;
  font-size:20px;
  color:var(--muted2);
  margin-right:10px;
}
.sidebar-toggle:hover { background:var(--border); }

.sidebar {
  position:fixed; top:0; left:-260px;
  width:260px; height:100vh;
  background:var(--panel);
  backdrop-filter: blur(20px);
  border-right:1px solid var(--border);
  z-index:300; padding:20px 0;
  transition:left .3s ease;
  display:flex; flex-direction:column;
}
.sidebar.open { left:0; }
.sidebar-overlay {
  display:none;
  position:fixed; inset:0;
  background:rgba(0,0,0,0.5);
  z-index:250;
}
.sidebar-overlay.show { display:block; }
.sidebar-logo {
  display:flex; align-items:center; gap:12px;
  padding:0 20px 20px;
  border-bottom:1px solid var(--border);
  margin-bottom:10px;
  cursor:pointer;
}
.sidebar-logo .logo-mark {
  width:36px; height:36px;
  font-size:18px;
}
.sidebar-logo-text {
  font-family:'Roboto', sans-serif;
  font-size:16px;
  font-weight:700;
  color:var(--text);
}
.sidebar-logo-text span { color:var(--sun); }
.sidebar-nav { display:flex; flex-direction:column; gap:4px; padding:0 10px; }
.sidebar-link {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px;
  border-radius:10px;
  color:var(--muted2);
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:all .2s;
}
.sidebar-link:hover { background:var(--panel2); color:var(--text); }
.sidebar-link.active {
  background:linear-gradient(135deg, var(--sun), var(--warn));
  color:white;
}
.sidebar-link-icon { font-size:18px; width:24px; }
.sidebar-close {
  position:absolute; top:15px; right:15px;
  width:32px; height:32px;
  background:var(--panel2);
  border:1px solid var(--border2);
  border-radius:8px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:18px;
  color:var(--muted2);
}
.sidebar-close:hover { color:var(--text); }

main { position:relative; z-index:1; padding:24px 28px; max-width:1200px; margin:0 auto; }
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:16px; }
.page-title {
  font-family:'Roboto', sans-serif;
  font-size:28px;
  font-weight:700;
  display:flex; align-items:center; gap:12px;
}
.page-title span { font-size:24px; }
.page-subtitle { font-size:13px; color:var(--muted); margin-top:4px; }

.card {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:22px;
  margin-bottom:16px;
}
.card-title {
  font-family:'Roboto', sans-serif;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--muted);
  margin-bottom:18px;
  display:flex; align-items:center; justify-content:space-between;
}
.badge {
  font-size:10px;
  padding:3px 9px;
  border-radius:20px;
  font-family:'Roboto', sans-serif;
  font-weight:600;
}
.badge-online { background:rgba(5,150,105,0.1); color:var(--green); border:1px solid rgba(5,150,105,0.3); }
.badge-offline { background:rgba(196,29,58,0.1); color:var(--red); border:1px solid rgba(196,29,58,0.3); }
.badge-warn { background:rgba(217,119,6,0.1); color:var(--warn); border:1px solid rgba(217,119,6,0.3); }
.badge-admin { background:rgba(109,40,217,0.1); color:var(--purple); border:1px solid rgba(109,40,217,0.3); }
.badge-user { background:rgba(37,99,235,0.1); color:var(--blue); border:1px solid rgba(37,99,235,0.3); }

.stats-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  margin-bottom:24px;
}
.stat-card {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
  display:flex; align-items:center; gap:16px;
}
.stat-icon {
  width:52px; height:52px;
  border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
}
.stat-icon.total { background:rgba(37,99,235,0.1); border:1px solid rgba(37,99,235,0.3); }
.stat-icon.online { background:rgba(5,150,105,0.1); border:1px solid rgba(5,150,105,0.3); }
.stat-icon.offline { background:rgba(196,29,58,0.1); border:1px solid rgba(196,29,58,0.3); }
.stat-icon.warn { background:rgba(217,119,6,0.1); border:1px solid rgba(217,119,6,0.3); }
.stat-label {
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
}
.stat-value {
  font-family:'Roboto', sans-serif;
  font-size:32px;
  font-weight:700;
}

.device-list {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:16px;
}
.device-card {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  transition:all .2s;
}
.device-card:hover { border-color:var(--border2); transform:translateY(-2px); box-shadow:0 4px 20px rgba(0,0,0,0.08); }
.device-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; }
.device-icon {
  width:48px; height:48px;
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
}
.device-icon.inverter { background:linear-gradient(135deg,rgba(217,119,6,0.15),rgba(217,119,6,0.08)); border:1px solid rgba(217,119,6,0.3); }
.device-icon.battery { background:linear-gradient(135deg,rgba(37,99,235,0.15),rgba(37,99,235,0.08)); border:1px solid rgba(37,99,235,0.3); }
.device-icon.meter { background:linear-gradient(135deg,rgba(109,40,217,0.15),rgba(109,40,217,0.08)); border:1px solid rgba(109,40,217,0.3); }
.device-icon.sensor { background:linear-gradient(135deg,rgba(5,150,105,0.15),rgba(5,150,105,0.08)); border:1px solid rgba(5,150,105,0.3); }
.device-icon.wifi { background:linear-gradient(135deg,rgba(217,119,6,0.15),rgba(217,119,6,0.08)); border:1px solid rgba(217,119,6,0.3); }
.device-info {}
.device-name { font-weight:700; font-size:16px; margin-bottom:4px; }
.device-type { font-size:12px; color:var(--muted); }
.device-status { display:flex; align-items:center; gap:6px; }
.status-dot { 
  width:8px; height:8px; 
  border-radius:50%; 
}
.status-dot.online { background:var(--green); box-shadow:0 0 8px var(--green); }
.status-dot.offline { background:var(--red); }
.status-dot.warn { background:var(--warn); animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.device-details {
  background:var(--panel2);
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
}
.detail-row {
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  border-bottom:1px solid var(--border2);
}
.detail-row:last-child { border-bottom:none; }
.detail-label { font-size:12px; color:var(--muted); }
.detail-value { font-family:'Roboto', sans-serif; font-size:12px; color:var(--text); }

.device-actions { display:flex; gap:8px; }
.btn {
  display:inline-flex; align-items:center; justify-content:center;
  gap:8px; padding:10px 18px;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
  border:none;
}
.btn-secondary {
  background:var(--panel2);
  color:var(--muted2);
  border:1px solid var(--border2);
}
.btn-secondary:hover { background:var(--border); }
.btn-danger {
  background:rgba(196,29,58,0.1);
  color:var(--red);
  border:1px solid rgba(196,29,58,0.3);
}
.btn-danger:hover { background:rgba(196,29,58,0.2); }
.btn-sm { padding:8px 14px; font-size:12px; }

.logs-container { max-height:300px; overflow-y:auto; }
.log-entry {
  display:flex; align-items:flex-start;
  gap:12px; padding:12px;
  border-bottom:1px solid var(--border2);
}
.log-entry:last-child { border-bottom:none; }
.log-time {
  font-family:'Roboto', sans-serif;
  font-size:11px;
  color:var(--muted);
  min-width:70px;
}
.log-icon { font-size:16px; }
.log-message { font-size:13px; flex:1; }
.log-message .device-name { color:var(--blue); font-weight:600; display:inline; }
.log-message .action { color:var(--muted); }

.refresh-btn {
  display:inline-flex; align-items:center;
  gap:8px; padding:10px 18px;
  border-radius:10px;
  background:var(--panel2);
  border:1px solid var(--border2);
  color:var(--muted2);
  font-size:13px;
  cursor:pointer;
  transition:all .2s;
}
.refresh-btn:hover { background:var(--border); }

.empty-state { 
  text-align:center; 
  padding:60px 20px; 
}
.empty-icon { font-size:64px; margin-bottom:16px; opacity:.5; }
.empty-title { font-size:20px; font-weight:700; margin-bottom:8px; }
.empty-desc { color:var(--muted); margin-bottom:24px; }

@media(max-width:900px){
  .sidebar-toggle { display:flex; }
  header .header-right .live-chip { display:none; }
}
@media(min-width:901px){
  .sidebar, .sidebar-overlay, .sidebar-toggle { display:none !important; }
}
@media(max-width:768px){
  header { padding:0 14px; height:54px; }
  .logo-mark { width:32px; height:32px; font-size:16px; }
  .logo-name { font-size:16px; }
  main { padding:14px; }
  .page-title { font-size:22px; }
  .stats-grid { grid-template-columns:repeat(2,1fr); }
  .card { padding:16px; border-radius:14px; }
  .device-list { grid-template-columns:1fr; }
  .user-name-display { display:none; }
}
</style>
</head>
<body>

<!-- Sidebar Overlay & Sidebar -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-close" onclick="toggleSidebar()">✕</div>
  <div class="sidebar-logo" onclick="window.location.href='index.html'">
    <div class="logo-mark">☀️</div>
    <div class="sidebar-logo-text">Solar<span>OS</span> Pro</div>
  </div>

    <div class="sidebar-link" onclick="window.location.href='index.html'"><span class="sidebar-link-icon">📊</span> Dashboard</div>
    <div class="sidebar-link" onclick="window.location.href='powerflow.html'"><span class="sidebar-link-icon">⚡</span> Power Flow</div>
    <div class="sidebar-link" onclick="window.location.href='analytics.html'"><span class="sidebar-link-icon">📈</span> Analytics</div>
    <div class="sidebar-link active" onclick="window.location.href='devices.html'"><span class="sidebar-link-icon">📱</span> Devices</div>

  </div>
</nav>

<header>
  <div style="display:flex;align-items:center;">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="logo" onclick="window.location.href='index.html'">
      <div class="logo-mark">☀️</div>
      <div class="logo-name">Solar <span>Pro</span></div>
    </div>
  </div>
  <div class="header-right">
    <div class="user-info-header" onclick="window.location.href='users.html'">
      <div class="user-avatar-small" id="userAvatar">👤</div>

        <div class="user-name-display" id="userName">User</div>

<main>
  <div class="page-header">
    <div>
      <h1 class="page-title"><span>📱</span> Connected Devices</h1>
      <p class="page-subtitle">Monitor and manage all connected IoT devices</p>

  <!-- Stats Grid -->
  <div class="stats-grid">

      <div class="stat-icon online">✓</div>
      <div class="stat-info">
        <div class="stat-label">Online</div>
        <div class="stat-value" id="onlineDevices">0</div>
      </div>
    </div>

      <div class="stat-icon offline">✕</div>

        <div class="stat-label">Offline</div>
        <div class="stat-value" id="offlineDevices">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon warn">⚠</div>
      <div class="stat-info">

        <div class="stat-value" id="warningDevices">0</div>

  <div class="card">
    <div class="card-title">
      Active Devices
      <span class="badge badge-online">Live</span>
    </div>

    </div>

  <div class="card">
    <div class="card-title">
      Connection Logs
      <span class="badge badge-warn">Recent</span>
    </div>

      <!-- Logs loaded dynamically -->
    </div>

<script>
// Same JS as original - all functionality preserved
// Auto logout after 3 minutes of inactivity
const AUTO_LOGOUT_TIME = 3 * 60 * 1000;
let inactivityTimer;

function resetInactivityTimer() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(() => { logout(); }, AUTO_LOGOUT_TIME);
  localStorage.setItem('solarLastActivity', Date.now());
}

document.addEventListener('mousemove', resetInactivityTimer);
document.addEventListener('keypress', resetInactivityTimer);
document.addEventListener('click', resetInactivityTimer);
document.addEventListener('scroll', resetInactivityTimer);
resetInactivityTimer();

// Check session
const lastActivity = localStorage.getItem('solarLastActivity');
if(lastActivity && (Date.now() - parseInt(lastActivity)) > AUTO_LOGOUT_TIME) { logout(); }

// Check authentication
const currentUser = localStorage.getItem('solarCurrentUser');
if(!currentUser) { window.location.href = 'login.html'; }
else {
  const user = JSON.parse(currentUser);
  document.getElementById('userName').textContent = user.name || user.username;
  document.getElementById('userRole').textContent = user.role === 'admin' ? 'Admin' : 'User';
  document.getElementById('userAvatar').textContent = user.role === 'admin' ? '👑' : '👤';
  if(user.role === 'admin') document.getElementById('sidebarAdminLink').style.display = 'flex';
}

function logout() {
  localStorage.removeItem('solarCurrentUser');
  localStorage.removeItem('solarToken');
  localStorage.removeItem('solarLastActivity');
  window.location.href = 'login.html';
}

// Device & log functions (identical to original)
function getDevices(){ return JSON.parse(localStorage.getItem('solarDevices') || '[]'); }
function saveDevices(devices){ localStorage.setItem('solarDevices', JSON.stringify(devices)); }
function getLogs(){ return JSON.parse(localStorage.getItem('solarDeviceLogs') || '[]'); }
function saveLogs(logs){ localStorage.setItem('solarDeviceLogs', JSON.stringify(logs)); }

function addLog(deviceName, action, icon){
  const logs = getLogs();
  logs.unshift({ time: new Date().toISOString(), device: deviceName, action: action, icon: icon });
  if(logs.length > 50) logs.pop();
  saveLogs(logs);
}

// Initialize demo devices if none exist
if(!localStorage.getItem('solarDevices')){
  saveDevices([
    {id:1,name:'Inverter 5G Pro',type:'inverter',ip:'192.168.1.100',mac:'AA:BB:CC:DD:EE:01',status:'online',lastSeen:new Date().toISOString(),model:'SP5G-10K',firmware:'v2.4.1'},
    {id:2,name:'WiFi Logger',type:'wifi',ip:'192.168.1.101',mac:'AA:BB:CC:DD:EE:02',status:'online',lastSeen:new Date().toISOString(),model:'LM5G-400',firmware:'v1.8.0'},

function updateStats(){
  const devices = getDevices();
  const online = devices.filter(d => d.status === 'online').length;
  const offline = devices.filter(d => d.status === 'offline').length;
  const warnings = devices.filter(d => d.status === 'warn').length;
  document.getElementById('totalDevices').textContent = devices.length;
  document.getElementById('onlineDevices').textContent = online;
  document.getElementById('offlineDevices').textContent = offline;
  document.getElementById('warningDevices').textContent = warnings;
}

function getDeviceIcon(type){
  const icons = {inverter:'⚡',battery:'🔋',meter:'📊',sensor:'🌡️',wifi:'📶'};
  return icons[type] || '📱';
}

function getStatusBadge(status){
  const badges = {online:'badge-online',offline:'badge-offline',warn:'badge-warn'};
  return badges[status] || 'badge-offline';
}

function formatLastSeen(isoString){
  const date = new Date(isoString);
  const now = new Date();
  const diff = now - date;
  if(diff < 60000) return 'Just now';
  if(diff < 3600000) return Math.floor(diff/60000) + ' min ago';
  if(diff < 86400000) return Math.floor(diff/3600000) + ' hours ago';
  return date.toLocaleDateString();
}
