<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolarOS Pro — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafbfc;
  --bg2: #f0f2f5;
  --panel: #ffffff;
  --panel2: #f8f9fa;
  --border: rgba(0,0,0,0.06);
  --border2: rgba(0,0,0,0.10);
  --sun: #E87706;
  --sun2: #C96600;
  --green: #0a8754;
  --red: #c41d3a;
  --blue: #2563eb;
  --purple: #6d28d9;
  --text: #1a1f36;
  --muted: #6b7280;
  --muted2: #4b5563;
  --warn: #d97706;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; overflow-x: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Roboto', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  margin: 0;
  padding: 0;
  overflow: hidden;
  display:flex; align-items:center; justify-content:center;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(217,119,6,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 10% 80%, rgba(37,99,235,0.06) 0%, transparent 60%),
    url('solar_grid.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-blend-mode: overlay;
  opacity: 0.3;
  pointer-events:none; z-index:0;
}
.login-container { 
  position:relative; 
  z-index:1; 
  width:100%; 
  max-width:460px; 
  padding:40px 24px;
  display:flex; align-items:center; justify-content:center; min-height:100vh;
  box-sizing: border-box;
}
.login-card {
  background:var(--panel);
  backdrop-filter: blur(28px);
  border:1px solid var(--border);
  border-radius:24px;
  padding:48px 40px;
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
  width:100%;
  max-width: 420px;
  position:relative;
  overflow:hidden;
}
.login-card::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg, var(--sun), var(--sun2), var(--sun));
}
.login-logo { 
  display:flex; flex-direction:column; align-items:center; 
  gap:16px; margin-bottom:26px; text-align:center;
}
.logo-mark {
  width:64px; height:64px;
  background: linear-gradient(135deg, var(--sun), var(--sun2));
  border-radius:20px;
  display:flex; align-items:center; justify-content:center;
  font-size:30px;
  box-shadow:0 0 32px rgba(217,119,6,0.4);
  animation:logoFloat 6s ease-in-out infinite;
}
@keyframes logoFloat {
  0%, 100% { transform:translateY(0) rotate(0deg); }
  50% { transform:translateY(-8px) rotate(180deg); }
}
.login-title {
  font-family: 'Roboto', sans-serif;
  font-size:30px;
  font-weight:700;
  letter-spacing:-0.5px;
  color: var(--text);
}
.login-title span { 
  color:var(--sun);
  font-weight:900;
}
.login-sub {
  font-size:14px;
  color:var(--muted);
  font-weight:400;
  max-width:340px;
  line-height:1.6;
  margin-bottom:20px;
}

.form-group { margin-bottom:30px; }
.form-input {
  width:100%;
  padding:10px 16px;
  background:var(--panel2);
  border:2px solid var(--border2);
  border-radius:16px;
  color:var(--text);
  font-family:'Roboto', sans-serif;
  font-size:16px;
  transition:all 0.3s ease;
}
.form-input:focus {
  outline:none;
  border-color:var(--sun);
  box-shadow:0 0 0 4px rgba(217,119,6,0.12);
  transform:translateY(-1px);
}
.form-input::placeholder { 
  color:var(--muted); 
  opacity:0.7;
}

/* Remember LEFT + Forgot RIGHT - SAME LINE */
.auth-options {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
  gap:80px;
}
.remember { 
  display:flex; 
  align-items:center; 
  gap:12px; 
  cursor:pointer; 
}
.remember input { display:none; }
.checkbox {
  width:20px; height:20px;
  border:2px solid var(--border2);
  border-radius:6px;
  background:var(--panel2);
  display:flex; align-items:center; justify-content:center;
  transition:all 0.3s ease;
  font-size:11px;
  font-weight:bold;
}
.remember input:checked + .checkbox {
  background:linear-gradient(135deg, var(--sun), var(--sun2));
  border-color:var(--sun);
  color:white;
}
.remember-text { 
  font-size:14px; 
  color:var(--muted2); 
  font-weight:500;
}
.forgot {
  font-size:14px;
  color:var(--sun);
  text-decoration:none;
  font-weight:500;
  transition:color 0.2s;
}
.forgot:hover { 
  color:var(--sun2);
  text-decoration:underline;
}

.login-btn {
  width:100%;
  padding:18px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg, var(--sun), var(--sun2));
  color:white;
  font-family:'Roboto', sans-serif;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
  transition:all 0.3s ease;
  letter-spacing:0.5px;
  position:relative;
  overflow:hidden;
}
.login-btn::before {
  content:'';
  position:absolute;
  top:0; left:-100%; width:100%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition:left 0.5s;
}
.login-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 15px 40px rgba(217,119,6,0.4);
}
.login-btn:hover::before {
  left:100%;
}
.login-btn:active { transform:translateY(0px); }

.error-msg {
  background:rgba(196,29,58,0.12);
  border:1px solid rgba(196,29,58,0.3);
  border-radius:12px;
  padding:16px 20px;
  margin-bottom:20px;
  display:none;
  animation:shake 0.5s ease-in-out;
}
@keyframes shake {
  0%, 100% { transform:translateX(0); }
  25% { transform:translateX(-4px); }
  75% { transform:translateX(4px); }
}
.error-msg.show { display:block; }
.error-msg span { 
  font-size:14px; 
  color:var(--red); 
  font-weight:500;
}

@media(max-width:768px){
  .login-container { padding:32px 20px; }
  .login-card { padding:40px 32px; border-radius:20px; }
  .logo-mark { width:56px; height:56px; font-size:26px; }
  .login-title { font-size:26px; }
  .auth-options { 
    flex-direction:column; 
    align-items:flex-start; 
    gap:12px;
  }
}
@media(max-width:480px){
  .login-container { padding:24px 16px; }
  .login-card { padding:32px 10px; }
  html { font-size: 13px; }
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">☀️</div>
      <h1 class="login-title">Solar <span>Pro</span></h1>
      <p class="login-sub">Home Solar IoT Dashboard</p>
      
      <div class="error-msg" id="errorMsg">
        <span>⚠️ Invalid credentials. Please try again.</span>
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <input type="text" class="form-input" id="username" placeholder="Username..." required>
        </div>
        
        <div class="form-group">
          <input type="password" class="form-input" id="password" placeholder="Password..." required>
        </div>
        
        <div class="auth-options">
          <label class="remember">
            <input type="checkbox" id="remember">
            <span class="checkbox"></span>
            <span class="remember-text">Remember me</span>
          </label>
          <a href="#" class="forgot">Forgot Password ?</a>
        </div>
        
        <button type="submit" class="login-btn">🔐 Sign In</button>
      </form>
    </div>
  </div>
</div>

<script>
// Same secure login logic
const AUTO_LOGOUT_TIME = 3 * 60 * 1000;
let inactivityTimer;

function resetInactivityTimer() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(logout, AUTO_LOGOUT_TIME);
  localStorage.setItem('solarLastActivity', Date.now());
}

['mousemove','keypress','click','scroll'].forEach(ev=>document.addEventListener(ev, resetInactivityTimer));
resetInactivityTimer();

function logout() {
  ['solarCurrentUser','solarToken','solarLastActivity'].forEach(key=>localStorage.removeItem(key));
  window.location.reload();
}

document.getElementById('loginForm').addEventListener('submit', e=>{
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const users = JSON.parse(localStorage.getItem('solarUsers') || '[]');
  
  const user = users.find(u => u.username === username && u.password === password);
  
  if(user){
    localStorage.setItem('solarCurrentUser', JSON.stringify(user));
    localStorage.setItem('solarToken', Date.now().toString());
    localStorage.setItem('solarLastActivity', Date.now().toString());
    document.getElementById('errorMsg').classList.remove('show');
    
    setTimeout(()=>{
      if(user.role === 'admin') window.location.href = 'index.html';
      else window.location.href = 'index.html';
    }, 600);
  } else {
    document.getElementById('errorMsg').textContent = 'Invalid username or password';
    document.getElementById('errorMsg').classList.add('show');
  }
});

// Auto-login check
const user = localStorage.getItem('solarCurrentUser');
if(user && Date.now() - parseInt(localStorage.getItem('solarLastActivity') || 0) < AUTO_LOGOUT_TIME){
  const parsed = JSON.parse(user);
  setTimeout(()=>parsed.role === 'admin' ? location.href='users.html' : location.href='home.html', 100);
}
</script>

</body>
</html>
