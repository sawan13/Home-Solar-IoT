<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
:root {
  --bg: #fafbfc;
  --bg2: #f0f2f5;
  --panel: #ffffff;
  --panel2: #f8f9fa;
  --border: rgba(0,0,0,0.06);
  --border2: rgba(0,0,0,0.10);
  --sun: #E87706;
  --sun2: #C96600;
  --green: #0a8754;
  --text: #1a1f36;
  --muted: #6b7280;
  --muted2: #4b5563;
}
* { margin:0; padding:0; box-sizing:border-box; }
header {
  position:sticky; top:0; z-index:100;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display:flex; align-items:center; justify-content:space-between;
  height: 60px;
  font-family: 'Roboto', sans-serif;
}
.logo { display:flex; align-items:center; gap:10px; cursor:pointer; }
.logo-mark {
  width:34px; height:34px;
  background: linear-gradient(135deg, var(--sun), #d97706);
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:17px;
}
.logo-name { font-weight:900; font-size:17px; letter-spacing:-0.5px; }
.logo-name span { color:var(--sun); }
.header-center { display:flex; align-items:center; gap:6px; }
.nav-tab {
  padding:6px 16px 4px 16px;
  border-radius:8px 8px 0 0;
  font-size:13px;
  font-weight:600;
  color:var(--muted2);
  cursor:pointer;
  border:none; background:none;
  border-bottom: 2px solid transparent;
  transition:all 0.2s;
}
.nav-tab:hover, .nav-tab:focus-visible { background:var(--panel2); color:var(--text); outline:none; }
.nav-tab.active { 
  background:transparent; 
  color:var(--text); 
  border-bottom-color: var(--sun2); 
  font-weight:700;
}
.header-right { display:flex; align-items:center; gap:12px; position:relative; }
.live-chip { display:flex; align-items:center; gap:7px; background: rgba(5,150,105,0.1); border:1px solid rgba(5,150,105,0.25); border-radius:20px; padding:5px 13px; font-size:11px; color:var(--green); }
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(5,150,105,0.5)} 50%{opacity:0.6;box-shadow:0 0 0 4px rgba(5,150,105,0)} }
.inverter-badge { background:var(--panel2); border:1px solid var(--border2); border-radius:8px; padding:6px 12px; font-size:12px; display:flex; align-items:center; gap:6px; }
.inv-dot { width:7px; height:7px; border-radius:50%; background:var(--sun); }
.user-menu { display:flex; flex-direction:column; align-items:center; cursor:pointer; padding:4px 8px; border-radius:8px; transition:all 0.2s; }
.user-menu:hover { background:var(--panel2); }
.user-icon { font-size:24px; }
.user-name { font-size:11px; font-weight:600; color:var(--text); }
.user-dropdown { 
  position:absolute; top:100%; right:0; 
  background:var(--panel); border:1px solid var(--border); 
  border-radius:8px; padding:8px; min-width:120px; 
  box-shadow:0 4px 20px rgba(0,0,0,0.1); z-index:1000; 
  flex-direction:column; gap:4px; display:none;
}
.user-dropdown.show { display:flex; }
.user-dropdown button { 
  background: var(--panel2); border:1px solid var(--sun2); 
  padding:6px 12px; text-align:left; cursor:pointer; 
  border-radius:6px; font-size:13px; color:var(--sun2);
  transition:all 0.2s; width:100%; 
}
.user-dropdown button:hover { background: var(--sun); color: white; border-color: var(--sun); }
</style>
</head>
<body>
<header>
  <div class="logo" onclick="parent.location.href='index.html'">
    <div class="logo-mark">☀️</div>
    <div class="logo-name">Solar<span>OS</span> <span style="color:var(--muted);font-size:11px;font-weight:400">Pro</span></div>
  </div>
  <div class="header-center">
    <button class="nav-tab" onclick="parent.location.href='index.html'">Dashboard</button>
    <button class="nav-tab" onclick="parent.location.href='analytics.html'">Analytics</button>
    <button class="nav-tab" onclick="parent.location.href='powerflow.html'">Power Flow</button>
    <button class="nav-tab" onclick="parent.location.href='devices.html'">Devices</button>
    <button class="nav-tab" onclick="parent.location.href='setup.html'">Setup Guide</button>
    <button class="nav-tab" onclick="parent.location.href='settings.html'">Settings</button>
  </div>
  <div class="header-right">
    <div class="status-stack">
      <div class="live-chip"><div class="live-dot"></div>LIVE</div>
      <div class="inverter-badge">
        <div class="inv-dot"></div>
        <span id="invName">WiFi Connected</span>
      </div>
    </div>
    <div class="user-menu" id="userMenu">
      <div class="user-icon">👤</div>
      <div class="user-name">User</div>
    </div>
    <div class="user-dropdown" id="userDropdown">
      <button onclick="parent.location.href='users.html'">➕ Add User</button>
      <button onclick="parent.logout()">🚪 Logout</button>
    </div>
  </div>
</header>

<script>
function setActiveTab(page) {
  document.querySelectorAll('.nav-tab').forEach(btn => btn.classList.remove('active'));
  const tab = Array.from(document.querySelectorAll('.nav-tab')).find(btn => {
    const onclick = btn.getAttribute('onclick') || '';
    return onclick.includes(page);
  });
  if (tab) tab.classList.add('active');
}

// Page detection
const currentPage = window.location.pathname.split('/').pop() || 'index.html';
setActiveTab(currentPage);

let timeout;
document.getElementById('userMenu').addEventListener('mouseenter', () => {
  clearTimeout(timeout);
  document.getElementById('userDropdown').classList.add('show');
});
document.getElementById('userMenu').addEventListener('mouseleave', () => {
  timeout = setTimeout(() => document.getElementById('userDropdown').classList.remove('show'), 150);
});
document.getElementById('userDropdown').addEventListener('mouseenter', () => clearTimeout(timeout));
document.getElementById('userDropdown').addEventListener('mouseleave', () => {
  timeout = setTimeout(() => document.getElementById('userDropdown').classList.remove('show'), 150);
});
</script>
</body>
</html>
