<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
:root {
  --bg: #fafbfc;
  --bg2: #f0f2f5;
  --panel: #ffffff;
  --panel2: #f8f9fa;
  --border: rgba(0,0,0,0.06);
  --border2: rgba(0,0,0,0.10);
  --sun: #E87706;
  --sun2: #C96600;
  --green: #0a8754;
  --text: #1a1f36;
  --muted: #6b7280;
  --muted2: #4b5563;
  --sun3: #d6d4d4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Roboto', sans-serif; background:var(--sun3); color:var(--text); margin:0; padding:0; }
.footer {
  width:100%;
  border-top:1px solid var(--border);
  padding:4px 12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:6px;
  font-size:10px;
  line-height:1.1;
  background:var(--sun3);
  min-height:26px;
}s
.footer .left, .footer .center, .footer .right { flex:1; }
.footer .center { text-align:center; color:var(--muted); }
.footer .right { text-align:right; color:var(--muted); }
.version { font-weight:700; color:var(--sun2); }
</style>
</head>
<body>
<div class="footer">
  <div class="left">Version: 0.5</div>
  <div class="center">© 2026 Copyright</div>
  <div class="right">Designed by Sawan</div>
</div>
</body>
</html>
